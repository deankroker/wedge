<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: warm white matching Astra palette -->
  <rect width="1200" height="630" fill="#FAF8F5"/>

  <!-- Subtle warm grid pattern -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#grid)" opacity="0.03"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#27251E"/>

  <!-- Op logomark: circle -->
  <circle cx="490" cy="280" r="52" fill="#27251E"/>

  <!-- Op logomark: p letter -->
  <text x="556" y="326" font-family="Georgia, serif" font-size="120" font-weight="400" fill="#27251E">p</text>

  <!-- Tagline -->
  <text x="600" y="420" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="32" fill="#271A0099" text-anchor="middle">Build your app with AI</text>

  <!-- URL -->
  <text x="600" y="570" font-family="monospace" font-size="18" fill="#271A0066" text-anchor="middle" letter-spacing="2">outpost.chat</text>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27251E" stroke-width="0.5"/>
    </pattern>
  </defs>
</svg>
